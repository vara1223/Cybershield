name: Selenium E2E Tests

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Use Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18.x'

    - name: Install Frontend Dependencies
      working-directory: ./frontend
      run: npm install

    - name: Install Selenium Dependencies
      working-directory: ./frontend/selenium-tests
      run: npm install

    - name: Build Expo Web App
      working-directory: ./frontend
      run: npx expo export -p web

    - name: Serve Web App Locally
      working-directory: ./frontend
      run: |
        npm install -g serve
        serve -s dist -l 8081 &
        sleep 5

    - name: Run Selenium Tests
      working-directory: ./frontend/selenium-tests
      run: npm run login
